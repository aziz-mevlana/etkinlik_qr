{% load static %}
<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Kod Tarayıcı</title>
  <script src="{% static 'etkinlik/js/qr.min.js' %}"></script>
  <link rel="stylesheet" href="{% static 'etkinlik/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'etkinlik/css/all.min.css' %}">
  <link rel="stylesheet" href="{% static 'etkinlik/css/qr_tarayici.css' %}">
  <style>
    @font-face {
      font-family: 'olneylight';
      font-style: normal;
      font-weight: normal;
      font-display: swap;
      src: url("{% static 'etkinlik/font/olney_light.woff2' %}") format('woff2');
      src: url("{% static 'etkinlik/font/olney_light.woff' %}") format('woff');
    }

    .aktif-oturum-badge {
      background-color: #243D8F;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 1.5rem;
      font-weight: 600;
      box-shadow: 0 3px 10px rgba(36, 61, 143, 0.4);
    }

    .aktif-oturum-badge .badge-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 0.25rem;
    }

    .aktif-oturum-badge .badge-value {
      font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <div class="app-header">
      <i class="fas fa-qrcode mb-2" style="font-size: 2.5rem;"></i>
      <h2>QR Kod Tarayıcı</h2>
    </div>
    <div class="scanner-container">
      <div class="aktif-oturum-badge">
        <div class="badge-label"><i class="fas fa-calendar-check mr-1"></i>Aktif Oturum</div>
        <div class="badge-value">{{ aktif_oturum_adi }}</div>
      </div>

      <div id="reader"></div>

      <div id="status-display" class="status-container" style="display: none;">
        <div id="status-icon-success" class="icon-container" style="display: none;">
          <i class="fas fa-check-circle status-icon success-icon"></i>
        </div>
        <div id="status-icon-error" class="icon-container" style="display: none;">
          <i class="fas fa-times-circle status-icon error-icon"></i>
        </div>
        <div id="status" class="status-text"></div>
        <div id="owner" class="owner-text"></div>
      </div>
    </div>
  </div>

  <!-- Görevli Öğrenciler için Gizli Buton -->
  <div class="gorevli-btn">
    <div class="btn-group">
      <button type="button" class="btn btn-secondary dropdown-toggle" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
        <i class="fas fa-cog"></i>
      </button>
      <div class="dropdown-menu dropdown-menu-right">
        <a class="dropdown-item" href="{% url 'etkinlik_katilim' %}">
          <i class="fas fa-file-alt mr-2"></i>Form Sayfası
        </a>
        <a class="dropdown-item" href="{% url 'qr_tarayici' %}">
          <i class="fas fa-qrcode mr-2"></i>QR Tarayıcı
        </a>
        {% if user.is_superuser or user.is_staff %}
        <a class="dropdown-item" href="{% url 'katilimci_listesi' %}">
          <i class="fas fa-list mr-2"></i>Katılımcı Listesi
        </a>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" href="{% url 'admin:index' %}">
          <i class="fas fa-user-shield mr-2"></i>Yönetici Paneli
        </a>
        {% endif %}
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" href="{% url 'cikis' %}">
          <i class="fas fa-sign-out-alt mr-2"></i>Çıkış Yap
        </a>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode;
    let selectedOturum = {{ aktif_oturum }};
    let isScannerRunning = false;
    let scanCooldown = false;

    function onScanSuccess(decodedText) {
      if (scanCooldown) return;
      scanCooldown = true;

      document.getElementById("status-display").style.display = "block";
      document.getElementById("status-icon-success").style.display = "none";
      document.getElementById("status-icon-error").style.display = "none";
      document.getElementById("status").innerText = "İşleniyor...";
      document.getElementById("owner").innerText = "";

      fetch("/etkinlik/qr-onayla/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify({ qr_data: decodedText, oturum: selectedOturum })
      })
        .then(response => response.json())
        .then(data => {
          if (data.status === 'success') {
            document.getElementById("status-icon-success").style.display = "block";
            document.getElementById("status").innerText = data.message;
            document.getElementById("owner").innerText = data.owner;
          } else {
            document.getElementById("status-icon-error").style.display = "block";
            document.getElementById("status").innerText = data.message;
            if (data.owner) document.getElementById("owner").innerText = data.owner;
          }

          setTimeout(() => {
            scanCooldown = false;
            document.getElementById("status-display").style.display = "none";
          }, 3000);
        })
        .catch(error => {
          console.error("Hata:", error);
          document.getElementById("status-icon-error").style.display = "block";
          document.getElementById("status").innerText = "Bağlantı Hatası";
          setTimeout(() => {
            scanCooldown = false;
            document.getElementById("status-display").style.display = "none";
          }, 3000);
        });
    }

    function onScanFailure(error) {}

    function startCamera() {
      html5QrCode.start(
        { facingMode: { exact: "environment" } },
        { fps: 10, qrbox: 250 },
        onScanSuccess,
        onScanFailure
      ).then(() => {
        isScannerRunning = true;
      }).catch(() => {
        html5QrCode.start(
          { facingMode: "user" },
          { fps: 10, qrbox: 250 },
          onScanSuccess,
          onScanFailure
        ).then(() => {
          isScannerRunning = true;
        }).catch(() => {
          document.getElementById("status-display").style.display = "block";
          document.getElementById("status-icon-error").style.display = "block";
          document.getElementById("status").innerText = "Kamera Erişimi Hatası";
          document.getElementById("owner").innerText = "Lütfen kamera izinlerini kontrol edin ve sayfayı yenileyin.";
          document.getElementById("reader").style.display = "none";
        });
      });
    }

    html5QrCode = new Html5Qrcode("reader");
    startCamera();
  </script>
  <script src="{% static 'etkinlik/js/jquery.min.js' %}"></script>
  <script src="{% static 'etkinlik/js/bootstrap.bundle.min.js' %}"></script>
</body>

</html>

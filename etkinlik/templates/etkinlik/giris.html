{% load static %}
<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <link rel="stylesheet" href="{% static 'etkinlik/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'etkinlik/css/all.min.css' %}">
    <style>
        @font-face {
            font-family: 'olneylight';
            font-style: normal;
            font-weight: normal;
            font-display: swap;
            src: url("{% static 'etkinlik/font/olney_light.woff2' %}") format('woff2');
            src: url("{% static 'etkinlik/font/olney_light.woff' %}") format('woff');
        }

        body {
            background-color: #181818;
            background-image: url("{% static 'etkinlik/img/topography.svg' %}");
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'olneylight', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .login-card {
            background: #1d1d1d;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            max-width: 400px;
            width: 100%;
            overflow: hidden;
        }

        .login-header {
            background-color: #243D8F;
            color: white;
            padding: 1.5rem;
            text-align: center;
        }

        .login-header h3 {
            margin: 0;
            font-weight: 600;
        }

        .login-body {
            padding: 2rem;
        }

        .form-control {
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            padding: 0.75rem;
            height: 45px;
        }

        .form-control:focus {
            background-color: #333;
            border-color: #243D8F;
            color: white;
            box-shadow: 0 0 0 0.2rem rgba(36, 61, 143, 0.25);
        }

        .form-control::placeholder {
            color: #888;
        }

        .btn-login {
            background-color: #243D8F;
            border: none;
            width: 100%;
            padding: 0.75rem;
            font-weight: 600;
            margin-top: 1rem;
            border-radius: 5px;
            color: white;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(36, 61, 143, 0.4);
            background-color: #1a2d6b;
        }

        .alert {
            border-radius: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <i class="fas fa-user-lock mb-2" style="font-size: 2rem;"></i>
            <h3>Giriş Yap</h3>
        </div>
        <div class="login-body">
            {% if hata %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle mr-2"></i>{{ hata }}
            </div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label><i class="fas fa-user mr-2"></i>Kullanıcı Adı</label>
                    <input type="text" name="kullanici_adi" class="form-control" placeholder="Kullanıcı adınızı girin" required>
                </div>
                <div class="form-group mt-3">
                    <label><i class="fas fa-lock mr-2"></i>Şifre</label>
                    <input type="password" name="sifre" class="form-control" placeholder="Şifrenizi girin" required>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="fas fa-sign-in-alt mr-2"></i>Giriş Yap
                </button>
            </form>
            <div class="text-center mt-3">
                <a href="{% url 'etkinlik_katilim' %}" style="color: #6b9fff; text-decoration: none;">
                    <i class="fas fa-arrow-left mr-2"></i>Form Sayfasına Dön
                </a>
            </div>
        </div>
    </div>
</body>

</html>
